- name: configure user server
  hosts: user
  become: yes
  tasks:
  - name: enable nodejs
    command: dnf module enable nodejs:20 -y

  - name: install nodejs package 
    package:
      name: nodejs
      state: present
  - name: create system user
    user:
      name: roboshop
      system: true
      shell: /sbin/nologin
      comment: "roboshop system user"
      home: /app
  
  - name: remove app directory
    file:
      path: /app
      state: absent
  
  - name: remove existing code
    file:
      path: /tmp/user.zip
      state: absent
    
  - name: create app directory
    file:
      path: /app
      state: directory
  
  - name: download user service code
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip
  
  - name: unzip user zip file
    unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes
  
  - name: install dependincies
    community.general.npm:
      path: /app
  
  - name: setup user service file
    template:
      src: user.service.j2
      dest: /etc/systemd/system/user.service

  - name: deamon reload
    systemd_service:
      name: user
      daemon_reload: true
  
  - name: enable and start the service
    service:
      name: user
      enabled: true
      state: restarted
