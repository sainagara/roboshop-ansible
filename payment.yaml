- name: configure payment server
  hosts: payment
  become: yes
  tasks:
  - name: install python packages
    package:
      name: "{{ item }}"
      state: present
    loop:
    - python3
    - gcc
    - python3-devel
  
  - name: create system user
    user:
      name: roboshop
      shell: /sbin/nologin
      home: /app
      system: true
      comment: "roboshop system user"
  
  - name: remove the app directory
    file:
      path: /app
      state: absent

  - name: remove existing code
    file:
      path: /tmp/payment.zip
      state: absent
  
  - name: create app directory
    file:
      path: /app
      state: directory
  
  - name: download the payment service code
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip
  
  - name: unzip the payment
    unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    pip:
      requirements: requirements.txt
      executable: pip3
    args:
      chdir: /app
  
  - name: copy payment service
    template:
      src: payment.service.j2
      dest: /etc/systemd/system/payment.service
  
  - name: daemon reload
    systemd_service:
      name: payment
      daemon_reload: true
  
  - name: enable and start the service
    service:
      name: payment
      state: restarted
      enabled: yes

  

      


