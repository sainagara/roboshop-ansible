- name: configure catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: enable nodejs version 20
    command: dnf module enable nodejs:20 -y 

  - name: install nodejs
    package:
      name: nodejs
      state: present
  
  - name: create system user
    user:
      name: roboshop
      system: true
      shell: /sbin/nologin
      state: present
      home: /app
      comment: "Roboshop system user"

  - name: remove app directory
    file:
      path: /app
      state: absent
  
  - name: delete the existing code
    file:
      path: /tmp/catalogue.zip
      state: absent

  - name: create app directory
    file:
      path: /app
      state: directory
  
  - name: download catalogue 
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip
  
  - name: unzip catalogue
    unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: install dependincies
    community.general.npm:
      path: /app

  - name: create catalouge service file
    template:
      src: catalogue.service.j2
      dest: /etc/systemd/system/catalogue.service

  - name: copy mongo repo
    copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  
  - name: install mongo client package
    package:
      name: mongodb-mongosh 
      state: present

  - name: check catalogue schema exists or not
    shell: mongosh --host "{{ MONGODB_HOST }}" --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output
    tags:
    - mongodb

  - name: print catalogue output
    debug:
      msg: "{{ catalogue_output }}"
  
  - name: load products
    shell: mongosh --host {{ MONGODB_HOST }} </app/db/master-data.js
    when: catalogue_output.stdout | int < 0
    tags:
    - mongodb

  - name: deamon reload
    systemd_service:
      name: catalogue
      daemon_reload: true

  - name: enable and start catalogue service
    service:
      name: catalogue
      state: restarted
      enabled: yes
