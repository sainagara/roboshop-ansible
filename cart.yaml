  - name: configure cart server
    hosts: cart
    become: yes
    tasks:
    - name: enable nodejs version
      command: dnf module enable nodejs:20 -y 
    
    - name: install nodejs package
      package:
        name: nodejs
        state: present
    
    - name: create system user
      user:
        name: roboshop
        shell: /sbin/nologin
        home: /app
        system: true
        comment: "roboshop system user"
    
    - name: remove the app directory
      file:
        path: /app
        state: absent

    - name: remove existing code
      file:
        path: /tmp/cart.zip
        state: absent
    
    - name: create app directory
      file:
        path: /app
        state: directory
    
    - name: download the code
      get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
        dest: /tmp/cart.zip
    
    - name: extract the zip file
      unarchive:
        src: /tmp/cart.zip
        dest: /app
        remote_src: yes
    
    - name: install dependincies
      community.general.npm:
        path: /app
    
    - name: set up cart service file
      template:
        src: cart.service.j2
        dest: /etc/systemd/system/cart.service

    - name: daemon reload
      systemd_service:
        name: cart
        daemon_reload: true
    
    - name: enable and start the service
      service:
        name: cart
        enabled: true
        state: restarted

        
